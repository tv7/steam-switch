<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SteamSwitch</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brand">
        <img class="brand-logo" id="brand-logo" alt="">
        <span class="brand-name">SteamSwitch</span>
      </div>

      <nav class="nav">
        <button class="nav-item active" data-view="library">
          <span class="nav-ico">▦</span> <span data-i18n="nav.library">Library</span>
        </button>
        <button class="nav-item" data-view="settings">
          <span class="nav-ico">⚙</span> <span data-i18n="nav.settings">Settings</span>
        </button>
      </nav>

      <button class="account-chip" id="account-chip" title="Manage accounts">
        <span class="chip-avatar" id="chip-avatar">··</span>
        <span class="chip-text">
          <span class="chip-count" id="chip-count">ACCOUNTS</span>
          <span class="chip-name" id="chip-name">…</span>
        </span>
      </button>
    </aside>

    <!-- Right column -->
    <div class="main">
      <header class="topbar">
        <label class="search">
          <span class="search-ico">🔍</span>
          <input id="search" type="text" data-i18n-ph="search.ph" placeholder="Search games in library…">
        </label>

        <button class="btn ghost" id="btn-refresh"><span>⟳</span> <span data-i18n="btn.refresh">Refresh</span></button>

        <div class="filter-wrap">
          <button class="btn ghost" id="btn-filter"><span>≡</span> <span data-i18n="btn.filter">Filter</span></button>
          <div class="menu" id="filter-menu" hidden></div>
        </div>

        <div class="spacer"></div>

        <label class="toggle" id="toggle-offline">
          <span class="toggle-label" data-i18n="toggle.offline">LAUNCH OFFLINE</span>
          <span class="switch"><span class="knob"></span></span>
        </label>

        <button class="btn danger" id="btn-stop" disabled><span>⊘</span> <span data-i18n="btn.stop">Stop launch</span></button>
      </header>

      <section class="content" id="content"><!-- views render here --></section>

      <footer class="statusbar">
        <span class="dot" id="status-dot"></span>
        <span id="status-text"></span>
        <span class="version" id="version"></span>
      </footer>
    </div>
  </div>

  <!-- In-app notifications: centered modals (progress / confirm / alert) + corner toasts.
       Replaces OS alert()/confirm() and routes transient messages off the status bar. -->
  <div id="overlay"></div>
  <div id="toasts"></div>

  <script src="app.js"></script>
</body>
</html>
